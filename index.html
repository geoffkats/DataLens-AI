<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DataLens AI</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // and other Node.js environment expectations
      (function() {
        if (typeof global === 'undefined') {
          window.global = window;
        }

        // Some libraries try to polyfill fetch by assignment: window.fetch = ...
        // In some environments, window.fetch is a read-only getter.
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function() { /* Ignore attempts to overwrite fetch */ },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          // If defineProperty fails, we try to make it writable
          try {
            const desc = Object.getOwnPropertyDescriptor(window, 'fetch');
            if (desc && !desc.writable && desc.configurable) {
              Object.defineProperty(window, 'fetch', { writable: true });
            }
          } catch (e2) {
            console.warn('DataLens: Could not patch fetch descriptor', e2);
          }
        }
      })();

      // Suppress MetaMask connection errors which can happen in sandboxed environments
      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && typeof event.reason.message === 'string' && 
            (event.reason.message.includes('MetaMask') || event.reason.message.includes('ethereum'))) {
          event.preventDefault();
        }
      });

      // Mock window.ethereum to prevent some libraries from trying to connect
      if (typeof window.ethereum === 'undefined') {
        window.ethereum = {
          isMetaMask: false,
          request: async () => { throw new Error('MetaMask not available'); },
          on: () => {},
          removeListener: () => {}
        };
      }

      // Patch for html2canvas to handle oklch colors by providing a fallback
      // This is a common issue with Tailwind v4 and html2canvas
      const originalGetComputedStyle = window.getComputedStyle;
      window.getComputedStyle = function(el) {
        const style = originalGetComputedStyle(el);
        const newStyle = {};
        for (let i = 0; i < style.length; i++) {
          const prop = style[i];
          let val = style.getPropertyValue(prop);
          if (val && val.includes('oklch')) {
            // Very basic fallback: if it's oklch, try to return a neutral color 
            // html2canvas fails on the oklch() function string
            // We'll replace it with a simple rgb equivalent or just white/black
            if (prop.includes('background')) val = 'rgb(255, 255, 255)';
            else if (prop.includes('color')) val = 'rgb(0, 0, 0)';
            else val = 'rgb(200, 200, 200)';
          }
          newStyle[prop] = val;
        }
        // Return a proxy that mimics CSSStyleDeclaration
        return new Proxy(style, {
          get(target, prop) {
            if (prop === 'getPropertyValue') {
              return (p) => {
                const v = target.getPropertyValue(p);
                if (v && v.includes('oklch')) return 'rgb(128, 128, 128)';
                return v;
              };
            }
            const v = target[prop];
            if (typeof v === 'string' && v.includes('oklch')) return 'rgb(128, 128, 128)';
            return v;
          }
        });
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
